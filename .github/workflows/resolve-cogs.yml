name: Resolve Cog Metadata

on:
  push:
    branches: [master]
    paths:
      - "data/cogs.json"
  schedule:
    # Re-resolve every hour to pick up new releases
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    name: Clone repos & extract pyproject.toml metadata
    runs-on: ubuntu-latest
    # Scheduled/dispatch runs also fire in forks (e.g. when a contributor's
    # fork still has this workflow). Skip there so it never commits to a
    # fork's branch and pollutes the resulting PR with bot commits.
    if: github.repository == 'Ballsdex-Team/ballsdex-index'

    steps:
      - name: Checkout ballsdex-index
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tomli

      - name: Run resolve script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/resolve_cogs.py

      - name: Commit updated resolved.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update resolved cog metadata [skip ci]"
          file_pattern: "public/data/resolved.json"
