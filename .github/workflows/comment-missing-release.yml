name: Comment on missing releases

on:
  workflow_run:
    workflows: ["Validate cogs.json"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Post missing-release comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download release check results
        uses: actions/download-artifact@v4
        with:
          name: release-check-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR about missing releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- missing-release-check -->';
            const prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim(), 10);
            const hasMissing = fs.readFileSync('has_missing.txt', 'utf8').trim() === 'has_missing=true';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (!hasMissing) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const details = fs.readFileSync('missing-releases.md', 'utf8');
            const body = `${marker}\n### ⚠️ Missing release\n\nThe following cog(s) declare a version in \`pyproject.toml\` with no matching git tag/release. They won't appear on the site until a release is cut:\n\n${details}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
